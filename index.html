<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jem Interactive Manga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="manga-panel">
            <img id="story-image" src="https://via.placeholder.com/600x400?text=Manga+Panel+Loading..." alt="Manga Panel">
        </div>

        <div class="story-content">
            <p id="story-text">
                เป้กำลังยืนเช็ดรถบะหมี่อย่างตั้งใจ แต่ทันใดนั้น ตาลก็วิ่งสะดุดรากไม้พุ่งตรงมาทางเขา!
            </p>
        </div>

        <div class="interaction-area">
            <input type="text" id="user-input" placeholder="พิมพ์คำสั่งให้ตัวละครทำอะไรต่อไปดี...">
            <button id="send-btn">ส่งคำสั่ง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
